version: '3.8'

services:
  bundestag-rag-api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STREAMLIT_SERVER_HEADLESS=false
      - STREAMLIT_SERVER_ENABLE_CORS=true
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=true
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
      - CACHE_ENABLED=true
      - LOG_LEVEL=INFO
      - DEVELOPMENT_MODE=true
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
      - ../../temp:/app/temp
    networks:
      - bundestag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for caching (if needed for advanced caching)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bundestag-network
    restart: unless-stopped
    profiles:
      - with-redis

networks:
  bundestag-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
